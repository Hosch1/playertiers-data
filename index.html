<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPerry-Tierlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12181a;
    --panel: #1a2224;
    --panel-border: #2a3638;
    --text: #e9f1f0;
    --text-muted: #8fa3a1;
    --orange: #ff7a29;
    --orange-soft: #ffb37a;
    --cyan: #2fd8c9;
    --cyan-dark: #12685f;
    --gold: #ffc72c;
    --gold-dark: #8a6d00;
    --silver: #c9c9c9;
    --silver-dark: #6f6f6f;
    --bronze: #cd7f32;
    --bronze-dark: #6e431a;
    --darkred: #4a0512;
    --darkred-light: #7a0e24;
    --uglygray: #3b3b3b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,122,41,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(47,216,201,0.07), transparent 45%);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 20px;
    margin-bottom: 40px;
  }

  h1 {
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 700;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    font-size: clamp(34px, 7vw, 56px);
    margin: 0;
    background: linear-gradient(100deg, var(--orange) 0%, var(--orange-soft) 32%, #eafffa 48%, #8ff0e4 58%, var(--cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .discord-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    transition: border-color 0.15s ease, color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .discord-btn:hover {
    border-color: var(--cyan-dark);
    color: var(--cyan);
    transform: scale(1.06);
    box-shadow: 0 0 14px rgba(47,216,201,0.3);
  }

  .meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    flex-shrink: 0;
  }
  .dot.error { background: #ff5a3c; box-shadow: 0 0 6px #ff5a3c; }

  .search {
    margin-bottom: 36px;
  }
  .search input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search input::placeholder { color: var(--text-muted); }
  .search input:focus { border-color: var(--cyan-dark); box-shadow: 0 0 0 2px rgba(47,216,201,0.18); }

  .tier-row {
    display: flex;
    gap: 28px;
    padding: 22px 0;
    border-bottom: 1px solid var(--panel-border);
    align-items: flex-start;
  }
  .tier-row:last-child { border-bottom: none; }

  .medallion {
    position: relative;
    flex-shrink: 0;
    width: 60px;
    height: 60px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 700;
    font-size: 26px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.32),
      inset -3px -3px 0 rgba(0,0,0,0.4),
      2px 3px 0 rgba(0,0,0,0.55);
    image-rendering: pixelated;
    overflow: hidden;
    transition: transform 0.15s ease;
  }

  .tier-row:hover .medallion {
    transform: scale(1.14) rotate(-2deg);
  }

  .medallion::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.3) 22%, transparent 22%, transparent 78%, rgba(0,0,0,0.28) 78%, rgba(0,0,0,0.28) 100%);
  }

  .medallion::after {
    content: '';
    position: absolute;
    top: -150%;
    left: -70%;
    width: 35%;
    height: 400%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
    transform: rotate(20deg);
    transition: left 0.45s ease;
  }
  .tier-row:hover .medallion::after { left: 140%; }

  .m-s {
    background: linear-gradient(135deg,
      #fff6c2 0%, #fff6c2 12%,
      #ffe066 12%, #ffe066 32%,
      #f2c230 32%, #f2c230 64%,
      #c9911a 64%, #c9911a 84%,
      #8a5a10 84%, #8a5a10 100%);
    color: #4a3000;
  }
  .m-s::before { background: none; }
  .m-a { background: var(--silver); color: #3a3a3a; }
  .m-b { background: var(--bronze); color: #3a210a; }
  .m-c { background: var(--darkred); color: #f0b8c2; }
  .m-d { background: var(--uglygray); color: #9a9a9a; }

  .tier-body { flex: 1; min-width: 0; }

  .tier-label {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .players {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .player {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 7px 12px 7px 7px;
    overflow: hidden;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .player:hover {
    border-color: var(--cyan-dark);
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 6px 16px rgba(47,216,201,0.22);
    z-index: 2;
  }

  .player::after {
    content: '';
    position: absolute;
    top: -150%;
    left: -70%;
    width: 35%;
    height: 400%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: rotate(20deg);
    transition: left 0.45s ease;
    pointer-events: none;
  }
  .player:hover::after { left: 140%; }

  .player img {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    image-rendering: pixelated;
    display: block;
    background: #000;
  }

  .player span {
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .empty-tier {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
  }

  .state-msg {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 14px;
  }

  footer {
    margin-top: 50px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .player {
    cursor: pointer;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,11,0.78);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 16px 40px rgba(0,0,0,0.5);
    padding: 32px;
    max-width: 420px;
    width: 100%;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    padding: 4px;
  }
  .modal-close:hover { color: var(--cyan); }

  .modal-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }

  .modal-skin {
    width: 140px;
    height: 280px;
    object-fit: contain;
    image-rendering: pixelated;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 10px;
  }

  .modal-medallion {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 700;
    font-size: 20px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.32),
      inset -2px -2px 0 rgba(0,0,0,0.4);
    margin: 0 auto;
  }

  .modal-info h2 {
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 22px;
    margin: 10px 0 4px;
  }

  .modal-tier-name {
    color: var(--text-muted);
    font-size: 13px;
  }

  .click-particle {
    position: fixed;
    width: 7px;
    height: 7px;
    border-radius: 1px;
    pointer-events: none;
    z-index: 200;
    transform: translate(-50%, -50%);
    animation: click-burst 0.55s ease-out forwards;
  }
  @keyframes click-burst {
    0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.2) rotate(80deg); opacity: 0; }
  }

  .click-ring {
    position: fixed;
    width: 8px;
    height: 8px;
    border: 2px solid var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 199;
    transform: translate(-50%, -50%);
    animation: click-ring 0.4s ease-out forwards;
  }
  @keyframes click-ring {
    0% { width: 8px; height: 8px; opacity: 0.65; }
    100% { width: 64px; height: 64px; opacity: 0; }
  }

  @media (max-width: 540px) {
    .tier-row { gap: 16px; }
    .medallion { width: 48px; height: 48px; font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>SMPerry-Tierlist</h1>
      <div class="header-right">
        <div class="meta"><span class="dot" id="statusDot"></span><span id="statusText">lädt …</span></div>
        <a class="discord-btn" href="https://discord.gg/5Ngc6vsQPB" target="_blank" rel="noopener noreferrer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 5.5C4 4.67 4.67 4 5.5 4h13c.83 0 1.5.67 1.5 1.5v13c0 .83-.67 1.5-1.5 1.5h-13C4.67 20 4 19.33 4 18.5v-13Z" stroke="currentColor" stroke-width="1.4" opacity="0"/>
            <circle cx="9" cy="13" r="1.6" fill="currentColor"/>
            <circle cx="15" cy="13" r="1.6" fill="currentColor"/>
            <path d="M8 8.5c2.7-1 5.3-1 8 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M6 16.5c.6-2.6 1-5.8 1-8 0 0 1.2-1 5-1s5 1 5 1c0 2.2.4 5.4 1 8-1.8 1.2-3.2 1.7-3.2 1.7l-.8-1.4M6 16.5c1.8 1.2 3.2 1.7 3.2 1.7l.8-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          Discord
        </a>
      </div>
    </header>

    <div class="search">
      <input type="text" id="searchInput" placeholder="Spieler suchen …">
    </div>

    <main id="content">
      <div class="state-msg">Lade Rangliste …</div>
    </main>

    <footer>Skins via mc-heads.net / minotar.net &middot; aktualisiert sich automatisch alle 45&nbsp;Sekunden</footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Schließen">&times;</button>
      <div class="modal-body">
        <img id="modalSkin" class="modal-skin" alt="">
        <div class="modal-info">
          <div class="modal-medallion" id="modalMedallion"></div>
          <h2 id="modalName"></h2>
          <div class="modal-tier-name" id="modalTierName"></div>
        </div>
      </div>
    </div>
  </div>

<script>
  const TIER_ORDER_CLASS = { S: 'm-s', A: 'm-a', B: 'm-b', C: 'm-c', D: 'm-d' };
  const REFRESH_MS = 45000;
  let lastData = null;
  let filterText = '';

  function avatarUrl(username, fallback) {
    return fallback
      ? `https://minotar.net/avatar/${encodeURIComponent(username)}/40`
      : `https://mc-heads.net/avatar/${encodeURIComponent(username)}/40`;
  }

  function bodyUrl(username, fallback) {
    return fallback
      ? `https://minotar.net/armor/body/${encodeURIComponent(username)}/200`
      : `https://mc-heads.net/body/${encodeURIComponent(username)}/200`;
  }

  function medallionClass(tierId) {
    return TIER_ORDER_CLASS[tierId.toUpperCase()] ? TIER_ORDER_CLASS[tierId.toUpperCase()] : '';
  }

  function render(data) {
    const content = document.getElementById('content');
    const allIds = Object.keys(data.tiers || {});
    const FIXED_ORDER = ['S', 'A', 'B', 'C', 'D'];
    const known = FIXED_ORDER.filter(id => allIds.includes(id));
    const extra = allIds.filter(id => !FIXED_ORDER.includes(id));
    const tierIds = known.concat(extra);

    if (tierIds.length === 0) {
      content.innerHTML = '<div class="state-msg">Noch keine Tiers definiert.</div>';
      return;
    }

    const grouped = {};
    tierIds.forEach(id => grouped[id] = []);
    Object.entries(data.players || {}).forEach(([name, tierId]) => {
      if (grouped[tierId]) grouped[tierId].push(name);
    });

    let html = '';
    tierIds.forEach(tierId => {
      const def = data.tiers[tierId];
      let players = grouped[tierId].sort((a, b) => a.localeCompare(b));
      if (filterText) {
        players = players.filter(p => p.toLowerCase().includes(filterText));
      }

      const mClass = medallionClass(tierId);

      html += `<div class="tier-row">`;
      html += `<div class="medallion ${mClass}">${def.label || tierId}</div>`;
      html += `<div class="tier-body">`;
      html += `<div class="tier-label">${players.length} Spieler</div>`;
      if (players.length === 0) {
        html += `<div class="empty-tier">${filterText ? 'Kein Treffer in diesem Tier.' : 'Noch niemand hier.'}</div>`;
      } else {
        html += `<div class="players">`;
        players.forEach(name => {
          const safeName = name.replace(/"/g, '&quot;');
          html += `<div class="player" data-name="${safeName}" data-tier="${tierId}">
            <img src="${avatarUrl(name, false)}" alt="${safeName}"
                 onerror="this.onerror=null;this.src='${avatarUrl(name, true)}';">
            <span>${name}</span>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div></div>`;
    });

    content.innerHTML = html;
  }

  async function loadData() {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      const res = await fetch('ranks.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      lastData = data;
      render(data);
      dot.classList.remove('error');
      const now = new Date();
      text.textContent = 'aktualisiert ' + now.toLocaleTimeString('de-DE');
    } catch (e) {
      dot.classList.add('error');
      text.textContent = 'Fehler beim Laden – nächster Versuch in Kürze';
      if (!lastData) {
        document.getElementById('content').innerHTML =
          '<div class="state-msg">Konnte die Rangliste nicht laden. Liegt ranks.json im selben Ordner?</div>';
      }
    }
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    filterText = e.target.value.trim().toLowerCase();
    if (lastData) render(lastData);
  });

  function openModal(name, tierId) {
    if (!lastData || !lastData.tiers[tierId]) return;
    const def = lastData.tiers[tierId];
    const mClass = medallionClass(tierId);

    document.getElementById('modalName').textContent = name;
    document.getElementById('modalTierName').textContent = 'Tier ' + (def.label || tierId);

    const medallion = document.getElementById('modalMedallion');
    medallion.className = 'modal-medallion ' + mClass;
    medallion.textContent = def.label || tierId;

    const skin = document.getElementById('modalSkin');
    skin.alt = name;
    skin.src = bodyUrl(name, false);
    skin.onerror = () => { skin.onerror = null; skin.src = bodyUrl(name, true); };

    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  document.getElementById('content').addEventListener('click', (e) => {
    const card = e.target.closest('.player');
    if (card) openModal(card.dataset.name, card.dataset.tier);
  });

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  const PARTICLE_COLORS = ['var(--orange)', 'var(--cyan)', '#f2c230', '#c9c9c9', '#cd7f32'];

  function spawnClickEffect(x, y) {
    const ring = document.createElement('div');
    ring.className = 'click-ring';
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
    document.body.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove());

    const count = 7;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'click-particle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() * 0.5 - 0.25);
      const dist = 26 + Math.random() * 22;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
      p.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
      p.style.background = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }
  }

  document.addEventListener('click', (e) => {
    if (document.getElementById('modalOverlay').classList.contains('open')) return;
    if (e.target.closest('a, button, input, .player')) return;
    spawnClickEffect(e.clientX, e.clientY);
  });

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
