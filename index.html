<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPerry-Tierlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12181a;
    --panel: #1a2224;
    --panel-border: #2a3638;
    --text: #e9f1f0;
    --text-muted: #8fa3a1;
    --orange: #ff7a29;
    --orange-soft: #ffb37a;
    --cyan: #2fd8c9;
    --cyan-dark: #12685f;
    --gold: #ffd700;
    --gold-dark: #8a6d00;
    --silver: #c9c9c9;
    --silver-dark: #6f6f6f;
    --bronze: #cd7f32;
    --bronze-dark: #6e431a;
    --darkred: #4a0512;
    --darkred-light: #7a0e24;
    --uglygray: #3b3b3b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,122,41,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(47,216,201,0.07), transparent 45%);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 20px;
    margin-bottom: 40px;
  }

  h1 {
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 700;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    font-size: clamp(26px, 4.8vw, 38px);
    margin: 0;
    background: linear-gradient(100deg, var(--orange) 0%, var(--orange-soft) 32%, #eafffa 48%, #8ff0e4 58%, var(--cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    flex-shrink: 0;
  }
  .dot.error { background: #ff5a3c; box-shadow: 0 0 6px #ff5a3c; }

  .search {
    margin-bottom: 36px;
  }
  .search input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search input::placeholder { color: var(--text-muted); }
  .search input:focus { border-color: var(--cyan-dark); box-shadow: 0 0 0 2px rgba(47,216,201,0.18); }

  .tier-row {
    display: flex;
    gap: 28px;
    padding: 22px 0;
    border-bottom: 1px solid var(--panel-border);
    align-items: flex-start;
  }
  .tier-row:last-child { border-bottom: none; }

  .medallion {
    position: relative;
    flex-shrink: 0;
    width: 60px;
    height: 60px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Pixelify Sans', sans-serif;
    font-weight: 700;
    font-size: 26px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.32),
      inset -3px -3px 0 rgba(0,0,0,0.4),
      2px 3px 0 rgba(0,0,0,0.55);
    image-rendering: pixelated;
    overflow: hidden;
  }

  .medallion::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.3) 22%, transparent 22%, transparent 78%, rgba(0,0,0,0.28) 78%, rgba(0,0,0,0.28) 100%);
  }

  .tier-row:hover .medallion::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.16);
  }

  .m-s { background: var(--gold); color: #4a3a00; }
  .m-a { background: var(--silver); color: #3a3a3a; }
  .m-b { background: var(--bronze); color: #3a210a; }
  .m-c { background: var(--darkred); color: #f0b8c2; }
  .m-d { background: var(--uglygray); color: #9a9a9a; }

  .tier-body { flex: 1; min-width: 0; }

  .tier-label {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .players {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .player {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 7px 12px 7px 7px;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .player:hover {
    border-color: var(--cyan-dark);
    transform: translateY(-1px);
  }

  .player img {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    image-rendering: pixelated;
    display: block;
    background: #000;
  }

  .player span {
    font-family: 'Pixelify Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .empty-tier {
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
  }

  .state-msg {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 14px;
  }

  footer {
    margin-top: 50px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0.7;
  }

  @media (max-width: 540px) {
    .tier-row { gap: 16px; }
    .medallion { width: 48px; height: 48px; font-size: 18px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>SMPerry-Tierlist</h1>
      <div class="meta"><span class="dot" id="statusDot"></span><span id="statusText">lädt …</span></div>
    </header>

    <div class="search">
      <input type="text" id="searchInput" placeholder="Spieler suchen …">
    </div>

    <main id="content">
      <div class="state-msg">Lade Rangliste …</div>
    </main>

    <footer>Skins via mc-heads.net / minotar.net &middot; aktualisiert sich automatisch alle 45&nbsp;Sekunden</footer>
  </div>

<script>
  const TIER_ORDER_CLASS = { S: 'm-s', A: 'm-a', B: 'm-b', C: 'm-c', D: 'm-d' };
  const REFRESH_MS = 45000;
  let lastData = null;
  let filterText = '';

  function avatarUrl(username, fallback) {
    return fallback
      ? `https://minotar.net/avatar/${encodeURIComponent(username)}/40`
      : `https://mc-heads.net/avatar/${encodeURIComponent(username)}/40`;
  }

  function medallionClass(tierId) {
    return TIER_ORDER_CLASS[tierId.toUpperCase()] ? TIER_ORDER_CLASS[tierId.toUpperCase()] : '';
  }

  function render(data) {
    const content = document.getElementById('content');
    const allIds = Object.keys(data.tiers || {});
    const FIXED_ORDER = ['S', 'A', 'B', 'C', 'D'];
    const known = FIXED_ORDER.filter(id => allIds.includes(id));
    const extra = allIds.filter(id => !FIXED_ORDER.includes(id));
    const tierIds = known.concat(extra);

    if (tierIds.length === 0) {
      content.innerHTML = '<div class="state-msg">Noch keine Tiers definiert.</div>';
      return;
    }

    const grouped = {};
    tierIds.forEach(id => grouped[id] = []);
    Object.entries(data.players || {}).forEach(([name, tierId]) => {
      if (grouped[tierId]) grouped[tierId].push(name);
    });

    let html = '';
    tierIds.forEach(tierId => {
      const def = data.tiers[tierId];
      let players = grouped[tierId].sort((a, b) => a.localeCompare(b));
      if (filterText) {
        players = players.filter(p => p.toLowerCase().includes(filterText));
      }

      const mClass = medallionClass(tierId);

      html += `<div class="tier-row">`;
      html += `<div class="medallion ${mClass}">${def.label || tierId}</div>`;
      html += `<div class="tier-body">`;
      html += `<div class="tier-label">${players.length} Spieler</div>`;
      if (players.length === 0) {
        html += `<div class="empty-tier">${filterText ? 'Kein Treffer in diesem Tier.' : 'Noch niemand hier.'}</div>`;
      } else {
        html += `<div class="players">`;
        players.forEach(name => {
          const safeName = name.replace(/"/g, '&quot;');
          html += `<div class="player">
            <img src="${avatarUrl(name, false)}" alt="${safeName}"
                 onerror="this.onerror=null;this.src='${avatarUrl(name, true)}';">
            <span>${name}</span>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div></div>`;
    });

    content.innerHTML = html;
  }

  async function loadData() {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      const res = await fetch('ranks.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      lastData = data;
      render(data);
      dot.classList.remove('error');
      const now = new Date();
      text.textContent = 'aktualisiert ' + now.toLocaleTimeString('de-DE');
    } catch (e) {
      dot.classList.add('error');
      text.textContent = 'Fehler beim Laden – nächster Versuch in Kürze';
      if (!lastData) {
        document.getElementById('content').innerHTML =
          '<div class="state-msg">Konnte die Rangliste nicht laden. Liegt ranks.json im selben Ordner?</div>';
      }
    }
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    filterText = e.target.value.trim().toLowerCase();
    if (lastData) render(lastData);
  });

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
